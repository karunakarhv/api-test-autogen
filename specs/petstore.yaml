openapi: "3.0.0"
info:
  title: Petstore API
  version: "1.0.0"
  description: Sample API used in the Test Automation Summit 2026 live demo

servers:
  - url: https://petstore3.swagger.io/api/v3

tags:
  - name: pet
    description: Everything about your Pets
  - name: store
    description: Access to Petstore orders
  - name: user
    description: Operations about user

paths:
  /pet:
    post:
      tags: [pet]
      summary: Add a new pet
      operationId: addPet
      security:
        - petstore_auth: [write:pets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid input
        "422":
          description: Validation exception

    put:
      tags: [pet]
      summary: Update an existing pet
      operationId: updatePet
      security:
        - petstore_auth: [write:pets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid ID supplied
        "404":
          description: Pet not found
        "422":
          description: Validation exception

  /pet/findByStatus:
    get:
      tags: [pet]
      summary: Finds Pets by status
      operationId: findPetsByStatus
      security:
        - petstore_auth: [read:pets]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [available, pending, sold]
            default: available
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid status value

  /pet/findByTags:
    get:
      tags: [pet]
      summary: Finds Pets by tags
      operationId: findPetsByTags
      security:
        - petstore_auth: [read:pets]
      parameters:
        - name: tags
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid tag value

  /pet/{petId}:
    get:
      tags: [pet]
      summary: Find pet by ID
      operationId: getPetById
      security:
        - api_key: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Invalid ID supplied
        "404":
          description: Pet not found

    post:
      tags: [pet]
      summary: Updates a pet in the store with form data
      operationId: updatePetWithForm
      security:
        - petstore_auth: [write:pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "400":
          description: Invalid input

    delete:
      tags: [pet]
      summary: Deletes a pet
      operationId: deletePet
      security:
        - petstore_auth: [write:pets]
      parameters:
        - name: api_key
          in: header
          required: false
          schema:
            type: string
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "400":
          description: Invalid pet value

  /store/inventory:
    get:
      tags: [store]
      summary: Returns pet inventories by status
      operationId: getInventory
      security:
        - api_key: []
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32

  /store/order:
    post:
      tags: [store]
      summary: Place an order for a pet
      operationId: placeOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid input
        "422":
          description: Validation exception

  /store/order/{orderId}:
    get:
      tags: [store]
      summary: Find purchase order by ID
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 10
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid ID supplied
        "404":
          description: Order not found

    delete:
      tags: [store]
      summary: Delete purchase order by ID
      operationId: deleteOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "400":
          description: Invalid ID supplied
        "404":
          description: Order not found

  /user:
    post:
      tags: [user]
      summary: Create user
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        default:
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /user/login:
    get:
      tags: [user]
      summary: Logs user into the system
      operationId: loginUser
      parameters:
        - name: username
          in: query
          required: false
          schema:
            type: string
        - name: password
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Invalid username/password supplied

  /user/logout:
    get:
      tags: [user]
      summary: Logs out current logged in user session
      operationId: logoutUser
      responses:
        default:
          description: Successful operation

  /user/{username}:
    get:
      tags: [user]
      summary: Get user by username
      operationId: getUserByName
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid username supplied
        "404":
          description: User not found

    put:
      tags: [user]
      summary: Update user
      operationId: updateUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        default:
          description: Successful operation

    delete:
      tags: [user]
      summary: Delete user
      operationId: deleteUser
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "400":
          description: Invalid username supplied
        "404":
          description: User not found

components:
  schemas:
    Pet:
      required: [name, photoUrls]
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          example: 10
        name:
          type: string
          example: doggie
          minLength: 1
          maxLength: 100
        category:
          $ref: "#/components/schemas/Category"
        photoUrls:
          type: array
          items:
            type: string
          minItems: 1
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        status:
          type: string
          description: pet status in the store
          enum: [available, pending, sold]

    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        name:
          type: string
          example: Dogs

    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          example: 10
        petId:
          type: integer
          format: int64
          minimum: 1
          example: 198772
        quantity:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          example: 7
        shipDate:
          type: string
          format: date-time
        status:
          type: string
          description: Order Status
          enum: [placed, approved, delivered]
          example: approved
        complete:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          example: 10
        username:
          type: string
          example: theUser
          minLength: 3
          maxLength: 50
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: James
        email:
          type: string
          format: email
          example: john@email.com
        password:
          type: string
          example: "12345"
          minLength: 6
        phone:
          type: string
          example: "12345"
        userStatus:
          type: integer
          format: int32
          description: User Status
          example: 1

  securitySchemes:
    petstore_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://petstore3.swagger.io/oauth/authorize
          scopes:
            write:pets: modify pets in your account
            read:pets: read your pets
    api_key:
      type: apiKey
      name: api_key
      in: header
