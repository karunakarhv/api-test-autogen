name: Nightly — Spec Validation & Regression

on:
  schedule:
    - cron: "0 20 * * *"    # 6am AEDT (UTC+10) every day
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  API_BASE_URL: "http://localhost:8080/api/v3"
  API_KEY: ${{ secrets.API_KEY }}

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Validate OpenAPI spec syntax
  # ─────────────────────────────────────────────────────────────────
  spec-validation:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install validators
        run: pip install pyyaml openapi-spec-validator

      - name: Validate spec syntax
        run: |
          python - <<'PYEOF'
          import sys, glob
          from openapi_spec_validator import validate_spec
          from openapi_spec_validator.readers import read_from_filename

          errors = []
          for spec_file in sorted(glob.glob("specs/*.yaml") + glob.glob("specs/*.json")):
              print(f"Validating {spec_file}...")
              try:
                  spec_dict, _ = read_from_filename(spec_file)
                  validate_spec(spec_dict)
                  print(f"  ✓ valid")
              except Exception as e:
                  print(f"  ✗ {e}")
                  errors.append(spec_file)

          if errors:
              print(f"\n{len(errors)} spec(s) failed validation: {errors}")
              sys.exit(1)
          else:
              print("\nAll specs valid.")
          PYEOF

      - name: Preview test count from spec
        run: |
          pip install pyyaml -q
          python - <<'PYEOF'
          import sys, glob
          sys.path.insert(0, "src")
          from spec_parser import SpecParser
          for spec_file in glob.glob("specs/*.yaml"):
              p = SpecParser(spec_file)
              s = p.summary()
              print(f"\n{spec_file}: {s['endpoints']} endpoints → {s['total']} tests")
              for scenario, count in sorted(s["by_scenario"].items()):
                  print(f"  {scenario:<22} {count}")
          PYEOF

  # ─────────────────────────────────────────────────────────────────
  # Full regression against local Petstore container
  # Image: swaggerapi/petstore3:unstable
  # Source: https://github.com/swagger-api/swagger-petstore
  # ─────────────────────────────────────────────────────────────────
  nightly-regression:
    name: Full regression — all scenarios
    runs-on: ubuntu-latest

    services:
      petstore:
        image: swaggerapi/petstore3:unstable
        ports:
          - 8080:8080
        options: >-
          --health-cmd "wget -qO- http://localhost:8080/api/v3/openapi.json || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Petstore API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/v3/openapi.json > /dev/null 2>&1 \
              && echo "✓ API ready (attempt $i)" && exit 0
            echo "  attempt $i/30 — waiting 3s"
            sleep 3
          done
          exit 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-html

      - name: Regenerate full test suite
        run: |
          python src/generate_pytest.py specs/petstore.yaml tests/generated
          python src/generate_postman.py specs/petstore.yaml output

      - name: Run full pytest suite
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          API_KEY: ${{ env.API_KEY }}
        run: |
          mkdir -p reports
          pytest tests/generated/ \
            -v \
            --tb=long \
            --junit-xml=reports/nightly_pytest.xml \
            --html=reports/nightly_pytest.html \
            --self-contained-html \
            -q \
            --timeout=30
        continue-on-error: true

      - name: Nightly Schemathesis — deep fuzz (200 examples)
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
        run: |
          schemathesis run specs/petstore.yaml \
            --url "$API_BASE_URL" \
            --checks all \
            --hypothesis-max-examples 200 \
            --junit-xml reports/nightly_schemathesis.xml \
            --timeout 15 \
            --validate-schema true \
            || true
        continue-on-error: true

      - name: Upload nightly reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # Notify on failure
  # ─────────────────────────────────────────────────────────────────
  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [spec-validation, nightly-regression]
    if: failure()

    steps:
      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔴 *Nightly API Tests Failed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔴 *Nightly API regression failed*\n*Repo:* ${{ github.repository }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
