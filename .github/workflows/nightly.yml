name: Nightly — Spec Validation & Regression

on:
  schedule:
    - cron: "0 20 * * *"      # 6am AEDT (UTC+10) every day
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  API_BASE_URL: "http://localhost:8080"
  API_KEY: ${{ secrets.API_KEY }}

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Validate spec is still in sync with the live API
  # ─────────────────────────────────────────────────────────────────
  spec-validation:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml openapi-spec-validator schemathesis

      - name: Validate spec syntax
        run: |
          python - <<'EOF'
          import sys
          from openapi_spec_validator import validate_spec
          from openapi_spec_validator.readers import read_from_filename
          import glob

          errors = []
          for spec_file in glob.glob("specs/*.yaml") + glob.glob("specs/*.json"):
              print(f"Validating {spec_file}...")
              try:
                  spec_dict, base_uri = read_from_filename(spec_file)
                  validate_spec(spec_dict)
                  print(f"  ✓ {spec_file} is valid")
              except Exception as e:
                  print(f"  ✗ {spec_file}: {e}")
                  errors.append(str(e))

          if errors:
              print(f"\n{len(errors)} validation error(s) found.")
              sys.exit(1)
          else:
              print("\nAll specs valid.")
          EOF

      - name: Check spec coverage (endpoints documented)
        run: |
          python - <<'EOF'
          import yaml, sys

          with open("specs/petstore.yaml") as f:
              spec = yaml.safe_load(f)

          paths = spec.get("paths", {})
          total_ops = sum(
              1 for methods in paths.values()
              for m in methods if m in {"get","post","put","patch","delete"}
          )
          ops_with_examples = sum(
              1 for methods in paths.values()
              for m, op in methods.items()
              if m in {"get","post","put","patch","delete"}
              and any(
                  "example" in str(v) or "examples" in str(v)
                  for v in op.get("requestBody", {}).values()
              )
          )
          print(f"Total operations : {total_ops}")
          print(f"With examples    : {ops_with_examples}")
          print(f"Coverage         : {ops_with_examples/total_ops*100:.0f}%" if total_ops else "N/A")
          EOF

  # ─────────────────────────────────────────────────────────────────
  # Full regression run against staging
  # ─────────────────────────────────────────────────────────────────
  nightly-regression:
    name: Full regression — all scenarios
    runs-on: ubuntu-latest

    services:
      api:
        image: swaggerapi/petstore3:unstable   # replace with your own image
        ports:
          - 8080:8080
        options: >-
          --health-cmd "wget -qO- http://localhost:8080/api/v3/openapi.json || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 > /dev/null 2>&1 && echo "API ready (attempt $i)" && break
            sleep 3
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-html

      - name: Regenerate full test suite
        run: |
          python src/generate_pytest.py specs/petstore.yaml tests/generated
          python src/generate_postman.py specs/petstore.yaml output

      - name: Run full pytest suite — all scenarios
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          API_KEY:      ${{ env.API_KEY }}
        run: |
          mkdir -p reports
          pytest tests/generated/ \
            -v \
            --tb=long \
            --junit-xml=reports/nightly_pytest.xml \
            --html=reports/nightly_pytest.html \
            --self-contained-html \
            -q \
            --timeout=30
        continue-on-error: true

      - name: Nightly Schemathesis — deep fuzz (more examples)
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
        run: |
          schemathesis run specs/petstore.yaml \
            --url "$API_BASE_URL" \
            --checks all \
            --hypothesis-max-examples 200 \
            --junit-xml reports/nightly_schemathesis.xml \
            --timeout 15 \
            --validate-schema true \
            || true
        continue-on-error: true

      - name: Upload nightly reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reports-${{ github.run_number }}
          path: reports/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # Alert on failures via Slack / email
  # ─────────────────────────────────────────────────────────────────
  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [spec-validation, nightly-regression]
    if: failure()

    steps:
      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔴 *Nightly API Tests Failed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔴 *Nightly API regression failed*\n*Repo:* ${{ github.repository }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\n*Spec:* `specs/petstore.yaml`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
