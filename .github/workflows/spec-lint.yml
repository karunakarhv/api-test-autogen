name: Spec Lint — fast check on every spec change

on:
  push:
    paths:
      - "specs/**"
  pull_request:
    paths:
      - "specs/**"

jobs:
  lint-spec:
    name: Lint & preview OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: pip install openapi-spec-validator pyyaml

      - name: Validate spec syntax
        run: |
          python - <<'PYEOF'
          import glob, sys
          from openapi_spec_validator import validate_spec
          from openapi_spec_validator.readers import read_from_filename

          failed = []
          for f in sorted(glob.glob("specs/*.yaml") + glob.glob("specs/*.json")):
              try:
                  spec, _ = read_from_filename(f)
                  validate_spec(spec)
                  print(f"✓ {f}")
              except Exception as e:
                  print(f"✗ {f}: {e}")
                  failed.append(f)

          if failed:
              sys.exit(1)
          PYEOF

      - name: Preview generated test count
        run: |
          python - <<'PYEOF'
          import sys, glob
          sys.path.insert(0, "src")
          from spec_parser import SpecParser

          for spec_file in glob.glob("specs/*.yaml"):
              p = SpecParser(spec_file)
              s = p.summary()
              print(f"\n{spec_file}")
              print(f"  {s['endpoints']} endpoints → {s['total']} tests would be generated")
              for scenario, count in sorted(s["by_scenario"].items()):
                  bar = "█" * (count // 2)
                  print(f"  {scenario:<22} {count:>3}  {bar}")
          PYEOF
